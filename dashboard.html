<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Council</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-canvas: #08090a; --bg-panel: #0f1011; --bg-surface: #191a1b;
    --text-primary: #f7f8f8; --text-secondary: #d0d6e0;
    --text-tertiary: #8a8f98; --text-quaternary: #62666d;
    --accent: #5e6ad2; --accent-soft: #7170ff; --accent-hover: #828fff;
    --border-subtle: rgba(255,255,255,0.05);
    --border-standard: rgba(255,255,255,0.08);
    --green: #10b981; --green-subtle: rgba(16,185,129,0.12);
    --radius-btn: 6px; --radius-card: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    font-feature-settings: 'cv01', 'ss03';
    background: var(--bg-canvas); color: var(--text-primary);
    height: 100vh; overflow: hidden;
    font-size: 15px; line-height: 1.6;
    -webkit-font-smoothing: antialiased; letter-spacing: -0.165px;
  }
  .app { display: flex; height: 100vh; }

  /* Sidebar */
  .sidebar {
    width: 260px; background: var(--bg-panel);
    border-right: 1px solid var(--border-subtle);
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  .sidebar-header { padding: 20px 16px; border-bottom: 1px solid var(--border-subtle); }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark {
    width: 28px; height: 28px; background: var(--accent);
    border-radius: var(--radius-btn);
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 500; color: #fff;
  }
  .logo-text { font-size: 15px; font-weight: 510; color: var(--text-primary); letter-spacing: -0.165px; }
  .new-btn {
    margin-top: 14px; width: 100%; padding: 8px 16px;
    background: var(--accent); border: none; border-radius: var(--radius-btn);
    color: #fff; font-size: 13px; font-weight: 510;
    font-family: inherit; cursor: pointer; transition: background 0.12s;
  }
  .new-btn:hover { background: var(--accent-hover); }
  .new-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .conv-list { flex: 1; overflow-y: auto; padding: 8px; }
  .conv-item {
    padding: 10px 12px; border-radius: var(--radius-card);
    cursor: pointer; transition: background 0.1s; margin-bottom: 1px;
  }
  .conv-item:hover { background: rgba(255,255,255,0.02); }
  .conv-item.active { background: rgba(94,106,210,0.08); }
  .conv-title {
    font-size: 13px; font-weight: 510; color: var(--text-secondary);
    letter-spacing: -0.13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .conv-item.active .conv-title { color: var(--text-primary); }
  .conv-meta {
    font-size: 11px; color: var(--text-quaternary);
    display: flex; gap: 8px; align-items: center; margin-top: 2px;
  }
  .empty-convs { padding: 24px 16px; text-align: center; color: var(--text-quaternary); font-size: 13px; }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg-canvas); }
  .cmd-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 24px; border-bottom: 1px solid var(--border-subtle);
    background: var(--bg-panel);
  }
  .cmd-input {
    flex: 1; padding: 10px 16px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border-standard);
    border-radius: var(--radius-btn); color: var(--text-primary);
    font-size: 15px; font-weight: 400; font-family: inherit; outline: none;
    letter-spacing: -0.165px; transition: border 0.12s;
  }
  .cmd-input::placeholder { color: var(--text-quaternary); }
  .cmd-input:focus { border-color: var(--accent-soft); }
  .cmd-input:disabled { opacity: 0.4; }
  .cmd-submit {
    padding: 10px 20px; background: var(--accent); border: none;
    border-radius: var(--radius-btn); color: #fff;
    font-size: 13px; font-weight: 510; font-family: inherit; cursor: pointer;
    transition: background 0.12s; white-space: nowrap;
  }
  .cmd-submit:hover { background: var(--accent-hover); }
  .cmd-submit:disabled { opacity: 0.4; cursor: not-allowed; }
  .cmd-meta {
    padding: 6px 24px 0; font-size: 12px; color: var(--text-quaternary);
    display: flex; gap: 16px;
  }

  /* Messages area */
  .messages { flex: 1; overflow-y: auto; padding: 24px; }
  .msg-group { margin-bottom: 32px; }
  .user-msg { margin-bottom: 20px; }
  .user-msg .label {
    font-size: 11px; font-weight: 510; color: var(--text-quaternary);
    text-transform: uppercase; letter-spacing: normal; margin-bottom: 6px;
  }
  .user-msg .content {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border-standard);
    border-radius: var(--radius-card); padding: 14px;
    color: var(--text-primary); line-height: 1.6;
    font-size: 14px; white-space: pre-wrap; max-width: 80%;
  }

  .stage {
    margin-bottom: 20px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border-standard);
    border-radius: var(--radius-card); overflow: hidden;
  }
  .stage-hdr {
    padding: 8px 14px; background: rgba(255,255,255,0.02);
    border-bottom: 1px solid var(--border-subtle);
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; font-weight: 510; color: var(--text-quaternary);
    text-transform: uppercase; letter-spacing: normal;
  }
  .stage-hdr .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
  .stage-body { padding: 14px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 12px; }
  .tab {
    padding: 4px 12px; font-size: 12px; font-weight: 510;
    background: rgba(255,255,255,0.02); border: 1px solid var(--border-standard);
    border-radius: var(--radius-btn); color: var(--text-tertiary);
    cursor: pointer; font-family: inherit; transition: all 0.12s;
  }
  .tab:hover { border-color: var(--accent-soft); color: var(--text-secondary); }
  .tab.active { background: rgba(94,106,210,0.1); border-color: var(--accent-soft); color: var(--accent-soft); }
  .stab { display: none; }
  .stab.active { display: block; }
  .resp-model {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-quaternary); margin-bottom: 4px;
  }
  .resp-text {
    color: var(--text-secondary); font-size: 14px; line-height: 1.7;
  }

  .rank-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .rank-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .rank-num { font-size: 13px; font-weight: 510; color: var(--accent-soft); width: 16px; text-align: center; }
  .rank-name { flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-secondary); }
  .rank-pts { font-size: 11px; color: var(--text-quaternary); }

  .eval-model {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-quaternary); margin-bottom: 4px;
  }
  .eval-text { color: var(--text-tertiary); font-size: 13px; line-height: 1.6; }

  .chairman-box {
    padding: 14px; background: rgba(94,106,210,0.06);
    border: 1px solid rgba(94,106,210,0.12); border-radius: var(--radius-card);
    margin-top: 8px;
  }
  .chairman-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--accent-soft); margin-bottom: 6px; font-weight: 500;
  }
  .chairman-text { color: var(--text-secondary); font-size: 14px; line-height: 1.7; }

  .loading {
    display: flex; align-items: center; gap: 8px;
    padding: 12px; color: var(--text-quaternary); font-size: 13px;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border-standard);
    border-top-color: var(--accent-soft);
    border-radius: 50%; animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); border-radius: 3px; }
</style>
</head>
<body>
<div class="app">

<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-mark">⚖</div>
      <span class="logo-text">LLM Council</span>
    </div>
    <button class="new-btn" id="newBtn" onclick="newConversation()">New deliberation</button>
  </div>
  <div class="conv-list" id="convList">
    <div class="empty-convs">No conversations yet</div>
  </div>
  <div style="padding:12px;border-top:1px solid var(--border-subtle);font-size:11px;color:var(--text-quaternary);text-align:center;">
    chipoto69/llm-council · v0.2.0
  </div>
</aside>

<main class="main" id="main">
  <div class="cmd-bar" id="cmdBar">
    <input class="cmd-input" id="queryInput" placeholder="Ask the council anything..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}">
    <button class="cmd-submit" id="sendBtn" onclick="sendMessage()">Convene</button>
  </div>
  <div class="messages" id="messages">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;opacity:0.3;text-align:center;gap:8px;">
      <h2 style="font-size:22px;font-weight:400;color:var(--text-primary);letter-spacing:-0.704px;">Council Chamber</h2>
      <p style="font-size:14px;color:var(--text-quaternary);max-width:400px;">Select a conversation or ask a question to convene the council.</p>
    </div>
  </div>
</main>

</div>

<script>
const API = 'http://localhost:8001';
let currentConv = null;

async function api(path, opts = {}) {
  const res = await fetch(`${API}${path}`, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (!res.ok) throw new Error(`${res.status}`);
  return res.json();
}

async function loadConversations() {
  const convs = await api('/api/conversations');
  const list = document.getElementById('convList');
  if (!convs.length) {
    list.innerHTML = '<div class="empty-convs">No conversations yet</div>';
    return;
  }
  list.innerHTML = convs.map(c => `
    <div class="conv-item${c.id === currentConv ? ' active' : ''}" onclick="selectConversation('${c.id}')">
      <div class="conv-title">${esc(c.title || 'Untitled')}</div>
      <div class="conv-meta">${c.message_count} messages</div>
    </div>
  `).join('');
}

async function newConversation() {
  const btn = document.getElementById('newBtn');
  btn.disabled = true; btn.textContent = 'Creating...';
  try {
    const c = await api('/api/conversations', { method: 'POST', body: '{}' });
    currentConv = c.id;
    await loadConversations();
    renderMessages(c);
    document.getElementById('queryInput').focus();
  } catch(e) { alert('Failed: ' + e.message); }
  btn.disabled = false; btn.textContent = 'New deliberation';
}

async function selectConversation(id) {
  currentConv = id;
  const c = await api(`/api/conversations/${id}`);
  await loadConversations();
  renderMessages(c);
}

function renderMessages(conv) {
  const el = document.getElementById('messages');
  if (!conv.messages.length) {
    el.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;opacity:0.3;"><p style="font-size:14px;color:var(--text-quaternary);">Awaiting your question...</p></div>`;
    return;
  }
  el.innerHTML = conv.messages.map((m, i) => {
    if (m.role === 'user') {
      return `<div class="msg-group">
        <div class="user-msg"><div class="label">You</div><div class="content">${esc(m.content)}</div></div>
      </div>`;
    }
    return renderAssistant(m, i);
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function renderAssistant(m, idx) {
  const s1 = m.stage1 || [];
  const s2 = m.stage2 || [];
  const s3 = m.stage3 || {};
  const meta = m.metadata || {};
  const labels = meta.label_to_model || {};
  const ranks = meta.aggregate_rankings || [];

  // Stage 1: Tabbed responses
  let s1html = '';
  if (s1.length) {
    const tabId = 's1t' + idx;
    s1html = `<div class="stage">
      <div class="stage-hdr">Stage 1 · First Opinions<div class="dot"></div></div>
      <div class="stage-body">
        <div class="tabs">${s1.map((r,i) => `<button class="tab${i===0?' active':''}" onclick="switchTab('${tabId}',${i})">${modelShort(r.model)}</button>`).join('')}</div>
        ${s1.map((r,i) => `<div class="stab${i===0?' active':''}" id="${tabId}-${i}">
          <div class="resp-model">${r.model}</div>
          <div class="resp-text">${md(r.response)}</div>
        </div>`).join('')}
      </div>
    </div>`;
  }

  // Stage 2: Peer rankings
  let s2html = '';
  if (s2.length) {
    const tabId2 = 's2t' + idx;
    s2html = `<div class="stage">
      <div class="stage-hdr">Stage 2 · Peer Rankings<div class="dot"></div></div>
      <div class="stage-body">
        ${ranks.length ? `<div class="rank-list">
          ${ranks.map((r,i) => `<div class="rank-row"><span class="rank-num">${i+1}</span><span class="rank-name">${r.model}</span><span class="rank-pts">avg ${r.average_rank}</span></div>`).join('')}
        </div>` : ''}
        <div class="tabs">${s2.map((r,i) => `<button class="tab${i===0?' active':''}" onclick="switchTab('${tabId2}',${i})">${modelShort(r.model)}</button>`).join('')}</div>
        ${s2.map((r,i) => `<div class="stab${i===0?' active':''}" id="${tabId2}-${i}">
          <div class="eval-model">${r.model} evaluates</div>
          <div class="eval-text">${md(r.ranking)}</div>
        </div>`).join('')}
      </div>
    </div>`;
  }

  // Stage 3: Chairman
  let s3html = '';
  if (s3.response) {
    s3html = `<div class="stage">
      <div class="stage-hdr">Stage 3 · Chairman Synthesis<div class="dot" style="background:var(--accent-soft);"></div></div>
      <div class="stage-body">
        <div class="chairman-box">
          <div class="chairman-label">${s3.model} · Chairman</div>
          <div class="chairman-text">${md(s3.response)}</div>
        </div>
      </div>
    </div>`;
  }

  return `<div class="msg-group">${s1html}${s2html}${s3html}</div>`;
}

async function sendMessage() {
  const input = document.getElementById('queryInput');
  const q = input.value.trim();
  if (!q) return;
  if (!currentConv) await newConversation();
  if (!currentConv) return;

  const btn = document.getElementById('sendBtn');
  const msgs = document.getElementById('messages');
  input.disabled = true; btn.disabled = true; btn.textContent = '...';

  // Show loading
  msgs.innerHTML += `<div class="msg-group"><div class="user-msg"><div class="label">You</div><div class="content">${esc(q)}</div></div>
    <div class="loading" id="ld"><div class="spinner"></div> Council deliberating...</div></div>`;
  msgs.scrollTop = msgs.scrollHeight;
  input.value = '';

  try {
    await api(`/api/conversations/${currentConv}/message`, {
      method: 'POST',
      body: JSON.stringify({ content: q }),
    });
    const c = await api(`/api/conversations/${currentConv}`);
    renderMessages(c);
    await loadConversations();
  } catch(e) {
    document.getElementById('ld').innerHTML = `<div style="color:#ef4444;padding:12px;">Failed: ${esc(e.message)}. Is the backend running on port 8001?</div>`;
  }

  input.disabled = false; btn.disabled = false; btn.textContent = 'Convene';
  input.focus();
}

function switchTab(prefix, idx) {
  const btns = document.querySelectorAll(`[onclick^="switchTab('${prefix}'"]`);
  btns.forEach((b, i) => {
    b.classList.toggle('active', i === idx);
    document.getElementById(`${prefix}-${i}`)?.classList.toggle('active', i === idx);
  });
}

function modelShort(name) {
  const parts = name.split('/');
  const last = parts[parts.length - 1];
  if (last.length > 20) return last.slice(0, 18) + '..';
  return last;
}
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function md(text) {
  if (!text) return '';
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code style="background:rgba(255,255,255,0.04);padding:1px 4px;border-radius:3px;font-family:JetBrains Mono,monospace;font-size:12px;">$1</code>')
    .replace(/\n/g, '<br>');
}

// Init
loadConversations();
document.getElementById('queryInput').focus();
</script>
</body>
</html>
